<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coptic to English Phonetic Translator</title>
    <style>
        :root {
            color-scheme: light;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #eef5f7;
            color: #1f2937;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px;
            background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.14), transparent 35%),
                        radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.12), transparent 30%),
                        #f4f7f6;
        }

        .page {
            width: min(100%, 1060px);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            text-align: center;
            padding: 28px 24px;
            border-radius: 24px;
            background: rgba(255,255,255,0.92);
            box-shadow: 0 18px 60px rgba(15, 23, 42, 0.08);
            border: 1px solid rgba(148, 163, 184, 0.18);
        }

        header h1 {
            margin: 0;
            font-size: clamp(2rem, 3vw, 3.2rem);
        }

        header p {
            margin: 16px auto 0;
            max-width: 820px;
            line-height: 1.75;
            color: #475569;
        }

        .translator {
            display: grid;
            gap: 20px;
            align-items: center;
        }

        .panel {
            background: #ffffff;
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 24px;
            padding: 22px;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.06);
        }

        .panel-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .label {
            color: #334155;
            font-size: 0.825rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            min-height: 280px;
            padding: 18px;
            border: 1px solid rgba(148, 163, 184, 0.24);
            border-radius: 18px;
            background: #f8fbfb;
            color: #0f172a;
            font-size: 1rem;
            line-height: 1.7;
            resize: vertical;
            transition: border-color 0.2s ease;
        }

        textarea:focus {
            border-color: #38bdf8;
            outline: none;
        }

        .arrow {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .arrow-mark {
            font-size: 2rem;
            color: #2563eb;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        button {
            border: none;
            border-radius: 999px;
            padding: 12px 18px;
            font-size: 0.95rem;
            cursor: pointer;
            color: #ffffff;
            background: #2563eb;
            box-shadow: 0 12px 26px rgba(37, 99, 235, 0.18);
            transition: transform 0.15s ease, background-color 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
            background-color: #1d4ed8;
        }

        button.secondary {
            background: #475569;
            box-shadow: 0 12px 22px rgba(71, 85, 105, 0.16);
        }

        .note-panel {
            padding: 24px;
            color: #334155;
            line-height: 1.75;
            background: rgba(255,255,255,0.92);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 24px;
        }

        .note-panel h2 {
            margin-top: 0;
        }

        @media (min-width: 980px) {
            .translator {
                grid-template-columns: 1fr auto 1fr;
                align-items: stretch;
            }

            .arrow {
                min-width: 70px;
                min-height: 70px;
                border-radius: 24px;
                background: rgba(59, 130, 246, 0.08);
                border: 1px solid rgba(59, 130, 246, 0.14);
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <header>
            <h1>Coptic to Coptic-English Translator</h1>
            <p>Paste Coptic text into the left box and the phonetic Coptic-English output appears on the right automatically. This is a browser-only page, so no install is required.</p>
        </header>

        <div class="translator">
            <section class="panel">
                <div class="panel-title">
                    <span class="label">Coptic</span>
                    <span class="label">Paste Coptic text here</span>
                </div>
                <textarea id="copticInput" placeholder="Type or paste Coptic text here..."></textarea>
            </section>

            <div class="arrow">
                <span class="arrow-mark">➡</span>
            </div>

            <section class="panel">
                <div class="panel-title">
                    <span class="label">Coptic-English</span>
                    <div class="actions">
                        <button id="copyButton" type="button">Copy output</button>
                        <button id="clearButton" type="button" class="secondary">Clear</button>
                    </div>
                </div>
                <textarea id="englishOutput" readonly placeholder="Translated phonetic output appears here..."></textarea>
            </section>
        </div>

        <section class="note-panel">

    <script>
        const inputField = document.getElementById('copticInput');
        const outputField = document.getElementById('englishOutput');
        const copyButton = document.getElementById('copyButton');
        const clearButton = document.getElementById('clearButton');

        const vowels = ['ⲁ', 'ⲉ', 'ⲏ', 'ⲓ', 'ⲟ', 'ⲩ', 'ⲱ'];
        const greekVowelsForGamma = ['ⲉ', 'ⲏ', 'ⲓ', 'ⲩ'];
        const gammaNChars = ['ⲅ', 'ⲕ', 'ⲝ', 'ⲭ'];
        const gangaJChars = ['ⲉ', 'ⲏ', 'ⲓ'];

        function addHyphens(text) {
            text = text.replace(/ⲑⲏⲉ̀ⲧ/gi, 'ⲑⲏ ⲉ̀ⲧ');
            const words = text.split(/([\s:;.,]+)/);
            return words.map(word => {
                if (!word.match(/[ⲁ-ⲱϣϥϧϩϫϭϯ]/i)) return word;
                let w = word;
                const prefixRegex = /^(ⲡⲓ|ⲧⲓ|ⲛⲓ|ⲟⲩ|ⲁϥ|ⲁⲥ|ⲁⲕ|ⲁⲩ|ⲉϥ|ⲉⲥ|ⲉⲕ|ⲉⲩ|ⲧⲉⲛ|ⲛⲉⲛ|ⲡⲉⲛ|ⲉⲣⲉ|ⲡⲁ|ⲧⲁ|ⲛⲁ|ⲡⲉ|ⲧⲉ|ⲛⲉ|ⲉⲧⲁϥ|ⲉⲧⲁⲥ|ⲙⲁⲓ)(?=[ⲁ-ⲱϣϥϧϩϫϭϯ])/i;
                w = w.replace(prefixRegex, '$1-');
                w = w.replace(/([ⲁ-ⲱϣϥϧϩϫϭϯ])([\u0300\u0301̀])/gi, '$1$2-');
                return w.replace(/--/g, '-');
            }).join('');
        }

        function translateCoptic(text) {
            const preProcessed = addHyphens(text);
            const lowerText = preProcessed.toLowerCase();
            let result = '';

            for (let i = 0; i < lowerText.length; i++) {
                const c = lowerText[i];
                const nextC = i + 1 < lowerText.length ? lowerText[i + 1] : ' ';
                const prevC = i > 0 ? lowerText[i - 1] : ' ';

                if (c === '\u0300' || c === '\u0301' || c === '̀') {
                    const lastChar = result.slice(-1);
                    const lastTwo = result.slice(-2);
                    if (['a', 'e', 'i', 'o', 'u', 'y'].includes(lastChar)) continue;
                    if (['sh', 'kh', 'ph', 'th', 'ch', 'ps'].includes(lastTwo)) {
                        result = result.slice(0, -2) + 'e' + lastTwo;
                    } else if (lastChar.match(/[a-z]/i)) {
                        result = result.slice(0, -1) + 'e' + lastChar;
                    } else {
                        result += 'e';
                    }
                    continue;
                }

                switch (c) {
                    case 'ⲁ': result += 'a'; break;
                    case 'ⲃ': result += vowels.includes(nextC) ? 'v' : 'b'; break;
                    case 'ⲅ':
                        if (greekVowelsForGamma.includes(nextC)) result += 'g';
                        else if (gammaNChars.includes(nextC)) result += 'n';
                        else result += 'gh';
                        break;
                    case 'ⲇ': result += 'th'; break;
                    case 'ⲉ': result += 'e'; break;
                    case 'ⲍ': result += 'z'; break;
                    case 'ⲏ': result += 'ee'; break;
                    case 'ⲑ': result += 'th'; break;
                    case 'ⲓ': result += 'i'; break;
                    case 'ⲕ': result += 'k'; break;
                    case 'ⲗ': result += 'l'; break;
                    case 'ⲙ': result += 'm'; break;
                    case 'ⲛ': result += 'n'; break;
                    case 'ⲝ': result += 'x'; break;
                    case 'ⲟ':
                        if (nextC === 'ⲩ') { result += 'ou'; i++; }
                        else result += 'o';
                        break;
                    case 'ⲡ': result += 'p'; break;
                    case 'ⲣ': result += 'r'; break;
                    case 'ⲥ': result += 's'; break;
                    case 'ⲧ': result += 't'; break;
                    case 'ⲩ':
                        if (prevC === 'ⲁ' || prevC === 'ⲉ') result += 'v';
                        else result += 'i';
                        break;
                    case 'ⲫ': result += 'f'; break;
                    case 'ⲭ':
                        if (greekVowelsForGamma.includes(nextC)) result += 'sh';
                        else result += 'kh';
                        break;
                    case 'ⲯ': result += 'ps'; break;
                    case 'ⲱ': result += 'o'; break;
                    case 'ϣ': result += 'sh'; break;
                    case 'ϥ': result += 'f'; break;
                    case 'ϧ': result += 'kh'; break;
                    case 'ϩ': result += 'h'; break;
                    case 'ϫ': result += gangaJChars.includes(nextC) ? 'j' : 'g'; break;
                    case 'ϭ': result += 'ch'; break;
                    case 'ϯ': result += 'ti'; break;
                    default: result += c;
                }
            }

            return result.replace(/--/g, '-').replace(/-: /g, ': ').replace(/^(.)/, char => char.toUpperCase());
        }

        function updateTranslation() {
            outputField.value = translateCoptic(inputField.value);
        }

        inputField.addEventListener('input', updateTranslation);
        window.addEventListener('load', updateTranslation);

        copyButton.addEventListener('click', async () => {
            if (!outputField.value) {
                alert('Paste Coptic text first to create output.');
                return;
            }
            await navigator.clipboard.writeText(outputField.value);
            copyButton.textContent = 'Copied!';
            setTimeout(() => { copyButton.textContent = 'Copy output'; }, 1200);
        });

        clearButton.addEventListener('click', () => {
            inputField.value = '';
            outputField.value = '';
            inputField.focus();
        });
    </script>
</body>
</html>
